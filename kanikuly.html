<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Сверка Каникул — Прознание / CODDY</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{--cream:#F5F1E8;--card:#FFFFFF;--ink:#1C1B19;--ink2:#6E6A62;--yellow:#FFD93B;--yellow-soft:#FBF0C4;--line:#EBE6DB;--blue:#3B5BDB;--green:#2E7D46;--red:#C0392B;--shadow:0 2px 14px rgba(28,27,25,.06)}
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Inter',sans-serif;background:var(--cream);color:var(--ink);min-height:100vh;-webkit-font-smoothing:antialiased}
  .topbar{max-width:1160px;margin:0 auto;padding:20px 24px 0;display:flex;align-items:center;gap:18px;flex-wrap:wrap}
  .brand{font-family:'Poppins',sans-serif;font-weight:600;font-size:18px;background:var(--card);padding:10px 20px;border-radius:100px;box-shadow:var(--shadow)}
  .brand b{color:#C9A800}
  nav.dashnav{display:flex;gap:2px;background:var(--card);padding:6px;border-radius:100px;box-shadow:var(--shadow);flex-wrap:wrap}
  nav.dashnav a{color:var(--ink2);font-size:13px;font-weight:500;text-decoration:none;padding:9px 18px;border-radius:100px}
  nav.dashnav a:hover{color:var(--ink)}
  nav.dashnav a.active{background:var(--ink);color:#fff}
  .pagehead{max-width:1160px;margin:0 auto;padding:22px 24px 4px}
  .pagehead h1{font-family:'Poppins',sans-serif;font-weight:600;font-size:30px;letter-spacing:-.02em}
  .pagehead p{color:var(--ink2);font-size:14px;margin-top:2px}
  .wrap{max-width:1160px;margin:0 auto;padding:18px 24px 60px}

  .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:16px;margin-bottom:28px}
  .smena{background:var(--card);border-radius:20px;padding:20px;box-shadow:var(--shadow)}
  .smena h3{font-family:'Poppins',sans-serif;font-size:16px;font-weight:600;margin-bottom:2px}
  .smena .period{font-size:12px;color:var(--ink2);margin-bottom:16px}
  .smena .big{font-family:'Poppins',sans-serif;font-size:34px;font-weight:600;line-height:1}
  .smena .big small{font-size:13px;color:var(--ink2);font-weight:400;font-family:'Inter',sans-serif}
  .metrics{display:flex;gap:8px;margin-top:16px;flex-wrap:wrap}
  .pill{font-size:12px;font-weight:600;padding:5px 12px;border-radius:100px}
  .pill.new{background:#EAF3FB;color:#2456A0}
  .pill.cli{background:#F0ECE2;color:#6E6A62}
  .pill.warn{background:#FBEAEA;color:#B0322A}

  .block{background:var(--card);border-radius:22px;padding:24px;margin-bottom:24px;box-shadow:var(--shadow)}
  .block h2{font-family:'Poppins',sans-serif;font-size:16px;font-weight:600;margin-bottom:16px}
  .filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
  .filters button{font-size:13px;font-weight:500;background:var(--card);border:1px solid var(--line);border-radius:100px;padding:8px 16px;cursor:pointer;color:var(--ink)}
  .filters button.active{background:var(--ink);color:#fff;border-color:var(--ink)}
  .table-scroll{overflow-x:auto}
  table{width:100%;border-collapse:collapse;font-size:13px;white-space:nowrap}
  th,td{padding:10px 12px;text-align:left;border-bottom:1px solid var(--line)}
  th{font-size:11px;font-weight:600;color:var(--ink2);text-transform:uppercase;letter-spacing:.04em}
  td.c{text-align:center}
  .tag{font-size:12px;font-weight:600;padding:3px 10px;border-radius:100px}
  .tag.new{background:#EAF3FB;color:#2456A0}
  .tag.cli{background:#F0ECE2;color:#6E6A62}
  .tag.no{background:#FBEAEA;color:#B0322A}
  .tag.yes{background:#EAF6EE;color:#227544}

  #status{padding:48px 0;text-align:center;color:var(--ink2)}
  #status.error{color:var(--red)}
  #gate{position:fixed;inset:0;background:var(--ink);display:flex;align-items:center;justify-content:center;z-index:10}
  #gate input{font-family:'Inter',sans-serif;font-size:15px;padding:12px 16px;border:none;border-radius:12px;outline:none;text-align:center;width:230px}
  #gate button{display:block;margin:12px auto 0;font-size:14px;font-weight:600;background:var(--yellow);color:var(--ink);border:none;border-radius:100px;padding:11px 28px;cursor:pointer}
</style>
</head>
<body>

<div id="gate"><form onsubmit="return checkPass(event)">
  <input type="password" id="passInput" placeholder="Пароль" autofocus>
  <button type="submit">Войти</button>
</form></div>

<div class="topbar">
  <div class="brand">Аналитика<b>.</b></div>
  <nav class="dashnav">
    <a href="index.html">Расход</a>
    <a href="funnel.html">Воронка</a>
    <a href="channel.html">Instagram-канал</a>
    <a href="brands.html">Направления</a>
    <a href="kanikuly.html" class="active">Каникулы</a>
  </nav>
</div>
<div class="pagehead">
  <h1>Сверка Каникул</h1>
  <p>Записи в смены (Альфа) против сделок в АМО · кто записал</p>
</div>

<div class="wrap">
  <div id="status">Загрузка…</div>
  <div id="content" style="display:none">
    <div class="cards" id="cards"></div>
    <div class="block">
      <h2>Все записанные дети</h2>
      <div class="filters" id="filters"></div>
      <div class="table-scroll"><table>
        <thead><tr><th>Смена</th><th>Ребёнок</th><th>Тип</th><th>Кто записал</th><th>Сделка в АМО</th></tr></thead>
        <tbody id="tbody"></tbody>
      </table></div>
    </div>
  </div>
</div>

<script>
const GAS_URL='https://script.google.com/macros/s/AKfycbwUcboOjB-_cLVnh549OU6BLK43F4rBn6QDN6eVohKfc5YAcNP2T-K_KVRqKm4_iHg4/exec';
const PASSWORD='proznanie';

let DATA=null, filterSmena='all';
if(sessionStorage.getItem('fb_dash_auth')==='1') document.getElementById('gate').style.display='none';
function checkPass(e){e.preventDefault();
  if(document.getElementById('passInput').value===PASSWORD){sessionStorage.setItem('fb_dash_auth','1');document.getElementById('gate').style.display='none';}
  else{document.getElementById('passInput').value='';document.getElementById('passInput').placeholder='Неверный пароль';}
  return false;}

const int=n=>Number(n||0).toLocaleString('ru-RU');

async function load(){
  const s=document.getElementById('status');
  try{
    const r=await fetch(GAS_URL+'?view=kanikuly');
    DATA=await r.json();
    if(DATA.error) throw new Error(DATA.error);
    if(!DATA.smeny||!DATA.smeny.length) throw new Error('Нет данных. Запустите buildKanikulySverka.');
    render();
    s.style.display='none';
    document.getElementById('content').style.display='block';
  }catch(err){s.className='error';s.textContent='Ошибка: '+err.message;}
}

function render(){
  // карточки смен
  const cards=document.getElementById('cards');cards.innerHTML='';
  DATA.smeny.forEach(sm=>{
    const el=document.createElement('div');el.className='smena';
    el.innerHTML=`
      <h3>${sm.smena}</h3>
      <div class="period">${sm.period}</div>
      <div class="big">${int(sm.total)} <small>детей</small></div>
      <div class="metrics">
        <span class="pill new">новых ${int(sm.novy)}</span>
        <span class="pill cli">клиентов ${int(sm.klient)}</span>
        ${sm.noAmo>0?`<span class="pill warn">без сделки ${int(sm.noAmo)}</span>`:''}
      </div>`;
    cards.appendChild(el);
  });

  // фильтры по смене
  const fbox=document.getElementById('filters');fbox.innerHTML='';
  [{v:'all',t:'Все смены'}].concat(DATA.smeny.map(s=>({v:s.smena,t:s.smena}))).forEach(o=>{
    const b=document.createElement('button');b.textContent=o.t;
    if(o.v===filterSmena)b.classList.add('active');
    b.onclick=()=>{filterSmena=o.v;render();};
    fbox.appendChild(b);
  });

  // таблица
  const tb=document.getElementById('tbody');tb.innerHTML='';
  DATA.rows.filter(r=>filterSmena==='all'||r.smena===filterSmena).forEach(r=>{
    const isNew=String(r.type).indexOf('новый')===0;
    const noAmo=String(r.amo)==='НЕТ';
    const tr=document.createElement('tr');
    tr.innerHTML=`
      <td>${r.smena}</td>
      <td>${r.child}</td>
      <td><span class="tag ${isNew?'new':'cli'}">${r.type}</span></td>
      <td>${r.who}</td>
      <td class="c"><span class="tag ${noAmo?'no':'yes'}">${r.amo}</span></td>`;
    tb.appendChild(tr);
  });
}

load();
</script>
</body>
</html>
