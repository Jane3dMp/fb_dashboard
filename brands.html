<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Заявки по направлениям — Прознание / CODDY</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root{--coal:#141414;--paper:#F7F6F2;--yellow:#FFD400;--blue:#2456D6;--grey:#8A8A84;--line:#E3E1DA;--card:#FFFFFF}
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'IBM Plex Sans',sans-serif;background:var(--paper);color:var(--coal);min-height:100vh}
  header{background:var(--coal);color:#fff;padding:20px 24px}
  header h1{font-size:17px;font-weight:600}
  header h1 span{color:var(--yellow)}
  nav.dashnav{background:#1f1f1f;padding:0 24px;display:flex;gap:4px;border-bottom:1px solid #2c2c2c;flex-wrap:wrap}
  nav.dashnav a{color:#b8b8b2;font-size:13px;font-weight:600;text-decoration:none;padding:12px 16px;border-bottom:2px solid transparent}
  nav.dashnav a:hover{color:#fff}
  nav.dashnav a.active{color:var(--yellow);border-bottom-color:var(--yellow)}
  .wrap{max-width:1000px;margin:0 auto;padding:24px 24px 60px}
  .block{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:18px;margin-bottom:24px}
  .block h2{font-size:14px;font-weight:600;margin-bottom:14px}
  .chart-box{position:relative;height:340px}
  .table-scroll{overflow-x:auto}
  table{width:100%;border-collapse:collapse;font-size:13px;white-space:nowrap}
  th,td{padding:9px 12px;text-align:right;border-bottom:1px solid var(--line)}
  th:first-child,td:first-child{text-align:left}
  th{font-size:11px;font-weight:600;color:var(--grey);text-transform:uppercase;letter-spacing:.04em}
  td{font-family:'IBM Plex Mono',monospace}
  td:first-child{font-family:'IBM Plex Sans',sans-serif;font-weight:500}
  tr.total td{font-weight:600;border-top:2px solid var(--coal);border-bottom:none}
  td.tcol{font-weight:600}
  .seg button{font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:600;background:var(--card);border:1px solid var(--line);border-radius:6px;padding:7px 14px;cursor:pointer;color:var(--coal)}
  .seg button.active{background:var(--coal);color:var(--yellow);border-color:var(--coal)}
  #status{padding:40px 0;text-align:center;color:var(--grey)}
  #status.error{color:#B33A2B}
  #gate{position:fixed;inset:0;background:var(--coal);display:flex;align-items:center;justify-content:center;z-index:10}
  #gate input{font-family:'IBM Plex Mono',monospace;font-size:15px;padding:10px 14px;border:none;border-radius:6px;text-align:center;width:220px}
  #gate button{display:block;margin:12px auto 0;font-size:14px;font-weight:600;background:var(--yellow);color:var(--coal);border:none;border-radius:6px;padding:9px 24px;cursor:pointer}
</style>
</head>
<body>

<div id="gate"><form onsubmit="return checkPass(event)">
  <input type="password" id="passInput" placeholder="Пароль" autofocus>
  <button type="submit">Войти</button>
</form></div>

<header><h1>Заявки по направлениям <span>·</span> по месяцам</h1></header>
<nav class="dashnav">
  <a href="index.html">Расход</a>
  <a href="funnel.html">Воронка</a>
  <a href="channel.html">Instagram-канал</a>
  <a href="brands.html" class="active">Направления</a>
</nav>

<div class="wrap">
  <div id="status">Загрузка…</div>
  <div id="content" style="display:none">
    <div class="seg" id="seg" style="display:flex;gap:8px;margin-bottom:18px">
      <button data-seg="all" class="active">Все</button>
      <button data-seg="ig">Instagram</button>
      <button data-seg="other">Прочие</button>
    </div>
    <div class="block">
      <h2>Заявки по направлениям, помесячно</h2>
      <div class="chart-box"><canvas id="chart"></canvas></div>
    </div>
    <div class="block">
      <h2>Таблица (IG / прочие по каждому направлению)</h2>
      <div class="table-scroll"><table>
        <thead><tr id="thead"></tr><tr id="thead2"></tr></thead>
        <tbody id="tbody"></tbody>
      </table></div>
    </div>
  </div>
</div>

<script>
/* ====== НАСТРОЙКИ ====== */
const GAS_URL = 'https://script.google.com/macros/s/AKfycbwUcboOjB-_cLVnh549OU6BLK43F4rBn6QDN6eVohKfc5YAcNP2T-K_KVRqKm4_iHg4/exec';   // тот же /exec
const PASSWORD = 'proznanie';
/* ======================= */

const COLORS = ['#2456D6','#FFD400','#C1694F','#2E7D46','#8A5CD6','#E0912F'];

if(sessionStorage.getItem('fb_dash_auth')==='1') document.getElementById('gate').style.display='none';
function checkPass(e){e.preventDefault();
  if(document.getElementById('passInput').value===PASSWORD){sessionStorage.setItem('fb_dash_auth','1');document.getElementById('gate').style.display='none';}
  else{document.getElementById('passInput').value='';document.getElementById('passInput').placeholder='Неверный пароль';}
  return false;}

const int=n=>Number(n||0).toLocaleString('ru-RU');
let DATA=null, seg='all'; // all | ig | other

async function load(){
  const s=document.getElementById('status');
  try{
    const resp=await fetch(GAS_URL+'?view=brands');
    const data=await resp.json();
    if(data.error) throw new Error(data.error);
    if(!data.months||!data.months.length) throw new Error('Нет данных. Запустите buildBrands.');
    DATA=data;
    render();
    s.style.display='none';
    document.getElementById('content').style.display='block';
  }catch(err){s.className='error';s.textContent='Ошибка: '+err.message;}
}

// значение ячейки под текущий сегмент
const val=(cell)=> seg==='ig'?cell.ig : seg==='other'?cell.other : (cell.ig+cell.other);

let chart=null;
function render(){
  const data=DATA;
  const labels=data.months.map(m=>m.month);
  const datasets=data.brands.map((b,i)=>({
    label:b,
    data:data.months.map(m=>val(m.values[b]||{ig:0,other:0})),
    backgroundColor:COLORS[i%COLORS.length],
    borderRadius:2, stack:'s'
  }));
  if(chart) chart.destroy();
  chart=new Chart(document.getElementById('chart'),{
    type:'bar', data:{labels,datasets},
    options:{responsive:true,maintainAspectRatio:false,
      scales:{x:{stacked:true},y:{stacked:true,grid:{color:'#EEECE5'},ticks:{precision:0}}},
      plugins:{legend:{labels:{font:{family:'IBM Plex Sans'}}}}}
  });

  // таблица: по две колонки на группу (IG / прочие) + Итого
  const thead=document.getElementById('thead');
  let h='<th rowspan="2">Месяц</th>';
  data.brands.forEach(b=>{h+='<th colspan="2">'+b+'</th>';});
  h+='<th rowspan="2">Итого</th>';
  thead.innerHTML=h;
  // вторая строка заголовка
  let sub='';
  data.brands.forEach(()=>{sub+='<th>IG</th><th>прочие</th>';});
  document.getElementById('thead2').innerHTML=sub;

  const tb=document.getElementById('tbody');tb.innerHTML='';
  const totIg={},totOt={};data.brands.forEach(b=>{totIg[b]=0;totOt[b]=0;});let grand=0;
  data.months.forEach(m=>{
    let row='<td>'+m.month+'</td>';
    data.brands.forEach(b=>{
      const c=m.values[b]||{ig:0,other:0};
      totIg[b]+=c.ig;totOt[b]+=c.other;
      row+='<td>'+int(c.ig)+'</td><td>'+int(c.other)+'</td>';
    });
    row+='<td class="tcol">'+int(m.total)+'</td>';grand+=m.total;
    const tr=document.createElement('tr');tr.innerHTML=row;tb.appendChild(tr);
  });
  let ft='<td>Итого</td>';
  data.brands.forEach(b=>{ft+='<td>'+int(totIg[b])+'</td><td>'+int(totOt[b])+'</td>';});
  ft+='<td>'+int(grand)+'</td>';
  const tr=document.createElement('tr');tr.className='total';tr.innerHTML=ft;tb.appendChild(tr);
}

document.querySelectorAll('#seg button').forEach(b=>b.addEventListener('click',()=>{
  document.querySelectorAll('#seg button').forEach(x=>x.classList.remove('active'));
  b.classList.add('active'); seg=b.dataset.seg; render();
}));

load();
</script>
</body>
</html>
