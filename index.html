<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Реклама Meta — Прознание / CODDY</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root{
    --cream:#F5F1E8; --card:#FFFFFF; --ink:#1C1B19; --ink2:#6E6A62;
    --yellow:#FFD93B; --yellow-soft:#FBF0C4; --line:#EBE6DB;
    --blue:#3B5BDB; --green:#2E7D46; --red:#C0392B; --shadow:0 2px 14px rgba(28,27,25,.06);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Inter',sans-serif;background:var(--cream);color:var(--ink);min-height:100vh;-webkit-font-smoothing:antialiased}
  .num,.value,td{font-variant-numeric:tabular-nums}

  /* ---- топбар: белая пилюля с навигацией ---- */
  .topbar{max-width:1160px;margin:0 auto;padding:20px 24px 0;display:flex;align-items:center;gap:18px;flex-wrap:wrap}
  .brand{font-family:'Poppins',sans-serif;font-weight:600;font-size:18px;letter-spacing:-.02em;background:var(--card);padding:10px 20px;border-radius:100px;box-shadow:var(--shadow)}
  .brand b{color:#C9A800}
  nav.dashnav{display:flex;gap:2px;background:var(--card);padding:6px;border-radius:100px;box-shadow:var(--shadow);flex-wrap:wrap}
  nav.dashnav a{color:var(--ink2);font-size:13px;font-weight:500;text-decoration:none;padding:9px 18px;border-radius:100px;transition:.15s}
  nav.dashnav a:hover{color:var(--ink)}
  nav.dashnav a.active{background:var(--ink);color:#fff}
  #updated{margin-left:auto;font-size:12px;color:var(--ink2)}

  /* ---- заголовок страницы ---- */
  .pagehead{max-width:1160px;margin:0 auto;padding:22px 24px 4px}
  .pagehead h1{font-family:'Poppins',sans-serif;font-weight:600;font-size:30px;letter-spacing:-.02em}
  .pagehead p{color:var(--ink2);font-size:14px;margin-top:2px}

  .wrap{max-width:1160px;margin:0 auto;padding:18px 24px 60px}

  /* ---- контролы ---- */
  .controls{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:16px}
  .controls button,.controls input[type=date],.seg button{
    font-family:'Inter',sans-serif;font-size:13px;font-weight:500;
    background:var(--card);border:1px solid var(--line);border-radius:100px;
    padding:8px 16px;cursor:pointer;color:var(--ink)
  }
  .controls input[type=date]{cursor:auto;border-radius:12px;padding:7px 12px}
  .controls button.active,.seg button.active{background:var(--ink);color:#fff;border-color:var(--ink)}
  .controls .sep{width:1px;height:22px;background:var(--line);margin:0 4px}
  .controls .refresh{margin-left:auto;color:var(--ink2)}
  .seg{display:flex;gap:8px;margin-bottom:18px}

  .accounts{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px}
  .accounts button{font-size:13px;font-weight:500;font-family:'Inter',sans-serif;background:var(--card);border:1px solid var(--line);border-radius:100px;padding:8px 18px;cursor:pointer;color:var(--ink)}
  .accounts button.active{background:var(--yellow);color:var(--ink);border-color:var(--yellow)}

  /* ---- KPI ---- */
  .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-bottom:26px}
  .kpi{background:var(--card);border-radius:20px;padding:20px 22px;box-shadow:var(--shadow)}
  .kpi .label{font-size:13px;color:var(--ink2);margin-bottom:10px}
  .kpi .value{font-family:'Poppins',sans-serif;font-size:30px;font-weight:600;letter-spacing:-.02em;line-height:1}
  .kpi.main{background:var(--yellow-soft)}
  .kpi.blue .value{color:var(--blue)}

  /* ---- блоки-карточки ---- */
  .block{background:var(--card);border-radius:22px;padding:24px;margin-bottom:24px;box-shadow:var(--shadow)}
  .block h2{font-family:'Poppins',sans-serif;font-size:16px;font-weight:600;margin-bottom:18px}
  .chart-box{position:relative;height:300px}

  /* ---- таблица ---- */
  .table-scroll{overflow-x:auto}
  table{width:100%;border-collapse:collapse;font-size:13px;white-space:nowrap}
  th,td{padding:11px 12px;text-align:center;border-bottom:1px solid var(--line)}
  th:first-child,td:first-child{text-align:left}
  th{font-size:11px;font-weight:600;color:var(--ink2);text-transform:uppercase;letter-spacing:.04em}
  td{font-family:'Inter',sans-serif}
  td:first-child{font-weight:500}
  td:first-child small{display:block;color:var(--ink2);font-weight:400}
  tr.total td{font-weight:700;border-top:2px solid var(--ink);border-bottom:none}
  td.tcol,th.tcol{font-weight:700;border-left:2px solid var(--ink);background:var(--yellow-soft)}
  th.grp,td.grp{border-left:1px solid var(--line)}
  td.other,th.other{background:#FBF9F4}
  td.zero{color:#CFCABE}

  /* ---- воронка ---- */
  .funnel{display:flex;flex-direction:column;gap:8px;margin-bottom:24px}
  .stage{display:flex;align-items:center;gap:14px;background:var(--card);border-radius:14px;padding:12px 16px;box-shadow:var(--shadow)}
  .stage input{width:18px;height:18px;cursor:pointer;flex:none;accent-color:var(--green)}
  .stage .name{flex:1;font-size:14px}
  .stage .bar-wrap{flex:2;background:#F0ECE2;border-radius:100px;height:22px;position:relative;overflow:hidden}
  .stage .bar{height:100%;background:var(--blue);border-radius:100px}
  .stage .cnt{font-family:'Poppins',sans-serif;font-weight:600;width:64px;text-align:right}
  .stage.win{background:#F1F8F3}
  .stage.win .bar{background:var(--green)}
  .summary{background:var(--card);border-radius:20px;padding:22px;box-shadow:var(--shadow);display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:16px}
  .summary .item .label{font-size:13px;color:var(--ink2);margin-bottom:6px}
  .summary .item .val{font-family:'Poppins',sans-serif;font-size:26px;font-weight:600}

  .tabs{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:18px}
  .tabs button{font-size:13px;font-weight:500;background:var(--card);border:1px solid var(--line);border-radius:100px;padding:8px 18px;cursor:pointer;color:var(--ink)}
  .tabs button.active{background:var(--yellow);color:var(--ink);border-color:var(--yellow)}

  .note{background:var(--yellow-soft);border-radius:16px;padding:14px 18px;font-size:13px;color:#6b5d1a;margin-bottom:22px;line-height:1.55}
  .hint{font-size:13px;color:var(--ink2);margin-bottom:14px}

  #status{padding:48px 0;text-align:center;color:var(--ink2);font-size:14px}
  #status.error{color:var(--red)}
  #warnings{font-size:12px;color:var(--red);margin-bottom:14px}

  #gate{position:fixed;inset:0;background:var(--ink);display:flex;align-items:center;justify-content:center;z-index:10}
  #gate input{font-family:'Inter',sans-serif;font-size:15px;padding:12px 16px;border:none;border-radius:12px;outline:none;text-align:center;width:230px}
  #gate button{display:block;margin:12px auto 0;font-size:14px;font-weight:600;background:var(--yellow);color:var(--ink);border:none;border-radius:100px;padding:11px 28px;cursor:pointer}
  @media(max-width:600px){.wrap,.pagehead,.topbar{padding-left:14px;padding-right:14px}.kpi .value{font-size:24px}.pagehead h1{font-size:24px}}

</style>
</head>
<body>

<div id="gate">
  <form onsubmit="return checkPass(event)">
    <input type="password" id="passInput" placeholder="Пароль" autofocus>
    <button type="submit">Войти</button>
  </form>
</div>

<div class="topbar">
  <div class="brand">Аналитика<b>.</b></div>
  <nav class="dashnav">
  <a href="index.html" class="active">Расход</a>
  <a href="funnel.html">Воронка</a>
  <a href="channel.html">Instagram-канал</a>
  <a href="brands.html">Направления</a>
  </nav>
  <div id="updated"></div>
</div>
<div class="pagehead">
  <h1>Расход на рекламу</h1>
  <p>Meta Ads по кабинетам и кампаниям</p>
</div>

<div class="wrap">
  <div class="controls">
    <button data-days="7">7 дней</button>
    <button data-days="14">14 дней</button>
    <button data-days="30" class="active">30 дней</button>
    <span class="sep"></span>
    <input type="date" id="dateFrom">
    <input type="date" id="dateTo">
    <button id="applyRange">Показать</button>
    <button class="refresh" id="btnRefresh">Обновить</button>
  </div>

  <div class="accounts" id="accounts"></div>
  <div id="warnings"></div>

  <div id="status">Загрузка…</div>

  <div id="content" style="display:none">
    <div class="kpis">
      <div class="kpi main"><div class="label">Расход</div><div class="value" id="kSpend">—</div></div>
      <div class="kpi"><div class="label">Лиды</div><div class="value" id="kLeads">—</div></div>
      <div class="kpi"><div class="label">Переписки</div><div class="value" id="kMsgs">—</div></div>
      <div class="kpi main"><div class="label">Цена лида</div><div class="value" id="kCpl">—</div></div>
      <div class="kpi blue"><div class="label">Клики</div><div class="value" id="kClicks">—</div></div>
      <div class="kpi blue"><div class="label">CTR</div><div class="value" id="kCtr">—</div></div>
    </div>

    <div class="block">
      <h2>Расход и лиды по дням</h2>
      <div class="chart-box"><canvas id="chart"></canvas></div>
    </div>

    <div class="block">
      <h2>По кампаниям</h2>
      <div class="table-scroll">
        <table>
          <thead><tr>
            <th>Кампания</th><th>Расход</th><th>Показы</th><th>Клики</th>
            <th>CTR</th><th>CPC</th><th>Лиды</th><th>Переписки</th><th>CPL</th>
          </tr></thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script>
/* ================= НАСТРОЙКИ ================= */
const GAS_URL = 'https://script.google.com/macros/s/AKfycbwUcboOjB-_cLVnh549OU6BLK43F4rBn6QDN6eVohKfc5YAcNP2T-K_KVRqKm4_iHg4/exec';
const PASSWORD = 'proznanie';
/* ============================================= */

let lastData = null;      // ответ бэкенда целиком
let currentAccount = 'all';
let currentQuery = 'days=30';
let chart = null;

/* ---------- пароль ---------- */
if (sessionStorage.getItem('fb_dash_auth') === '1') {
  document.getElementById('gate').style.display = 'none';
}
function checkPass(e) {
  e.preventDefault();
  if (document.getElementById('passInput').value === PASSWORD) {
    sessionStorage.setItem('fb_dash_auth', '1');
    document.getElementById('gate').style.display = 'none';
  } else {
    document.getElementById('passInput').value = '';
    document.getElementById('passInput').placeholder = 'Неверный пароль';
  }
  return false;
}

/* ---------- период: пресеты ---------- */
document.querySelectorAll('.controls button[data-days]').forEach(btn => {
  btn.addEventListener('click', () => {
    setActivePreset(btn);
    currentQuery = 'days=' + btn.dataset.days;
    loadData();
  });
});

function setActivePreset(btn) {
  document.querySelectorAll('.controls button[data-days]').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
}

/* ---------- период: произвольный ---------- */
document.getElementById('applyRange').addEventListener('click', () => {
  const from = document.getElementById('dateFrom').value;
  const to = document.getElementById('dateTo').value;
  if (!from || !to) { alert('Укажите обе даты'); return; }
  if (from > to) { alert('Дата начала позже даты конца'); return; }
  setActivePreset(null);
  currentQuery = 'since=' + from + '&until=' + to;
  loadData();
});

document.getElementById('btnRefresh').addEventListener('click', () => loadData(true));

/* ---------- фильтр аккаунтов ---------- */
function renderAccountChips(accounts) {
  const box = document.getElementById('accounts');
  box.innerHTML = '';
  if (!accounts || accounts.length < 2) return; // один кабинет — фильтр не нужен
  const all = [{ id: 'all', name: 'Все аккаунты' }, ...accounts];
  all.forEach(a => {
    const b = document.createElement('button');
    b.textContent = a.name;
    b.dataset.id = a.id;
    if (a.id === currentAccount) b.classList.add('active');
    b.addEventListener('click', () => {
      currentAccount = a.id;
      box.querySelectorAll('button').forEach(x => x.classList.remove('active'));
      b.classList.add('active');
      render();
    });
    box.appendChild(b);
  });
}

/* ---------- загрузка ---------- */
async function loadData(force) {
  const status = document.getElementById('status');
  const content = document.getElementById('content');
  status.style.display = 'block';
  status.className = '';
  status.textContent = 'Загрузка…';
  content.style.display = 'none';
  document.getElementById('warnings').textContent = '';

  try {
    const resp = await fetch(GAS_URL + '?' + currentQuery + (force ? '&nocache=1' : ''));
    const data = await resp.json();
    if (data.error) throw new Error(data.error);
    lastData = data;

    // если выбранный аккаунт исчез из ответа — сброс на «все»
    if (currentAccount !== 'all' && !(data.accounts || []).some(a => a.id === currentAccount)) {
      currentAccount = 'all';
    }
    renderAccountChips(data.accounts);
    if (data.warnings) {
      document.getElementById('warnings').textContent = 'Частично: ' + data.warnings.join(' | ');
    }
    render();
    status.style.display = 'none';
    content.style.display = 'block';
  } catch (err) {
    status.className = 'error';
    status.textContent = 'Ошибка: ' + err.message;
  }
}

/* ---------- форматирование ---------- */
const fmtInt = n => n.toLocaleString('ru-RU');
const fmtMoney = (n, cur) => n.toLocaleString('ru-RU', { maximumFractionDigits: 2 }) + ' ' + cur;

/* ---------- отрисовка (с учётом фильтра аккаунта) ---------- */
function render() {
  const data = lastData;
  const cur = data.currency;
  const rows = currentAccount === 'all'
    ? data.rows
    : data.rows.filter(r => r.account_id === currentAccount);

  document.getElementById('updated').textContent =
    data.since + ' — ' + data.until + ' · обновлено ' + new Date(data.updated).toLocaleString('ru-RU');

  const t = { spend: 0, impressions: 0, clicks: 0, leads: 0, messages: 0 };
  rows.forEach(r => { for (const k in t) t[k] += r[k]; });

  document.getElementById('kSpend').textContent = fmtMoney(t.spend, cur);
  document.getElementById('kLeads').textContent = fmtInt(t.leads);
  document.getElementById('kMsgs').textContent = fmtInt(t.messages);
  document.getElementById('kCpl').textContent = t.leads ? fmtMoney(t.spend / t.leads, cur) : '—';
  document.getElementById('kClicks').textContent = fmtInt(t.clicks);
  document.getElementById('kCtr').textContent =
    t.impressions ? (t.clicks / t.impressions * 100).toFixed(2) + '%' : '—';

  /* по дням */
  const byDay = {};
  rows.forEach(r => {
    if (!byDay[r.date]) byDay[r.date] = { spend: 0, conv: 0 };
    byDay[r.date].spend += r.spend;
    byDay[r.date].conv += r.leads + r.messages;
  });
  const days = Object.keys(byDay).sort();
  const labels = days.map(d => d.slice(8, 10) + '.' + d.slice(5, 7));

  if (chart) chart.destroy();
  chart = new Chart(document.getElementById('chart'), {
    data: {
      labels,
      datasets: [
        { type: 'bar', label: 'Расход, ' + cur, data: days.map(d => byDay[d].spend),
          backgroundColor: '#FFD400', borderRadius: 3, yAxisID: 'y' },
        { type: 'line', label: 'Лиды + переписки', data: days.map(d => byDay[d].conv),
          borderColor: '#2456D6', backgroundColor: '#2456D6', tension: .3, pointRadius: 3, yAxisID: 'y1' }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      scales: {
        y: { position: 'left', grid: { color: '#EEECE5' } },
        y1: { position: 'right', grid: { display: false }, ticks: { precision: 0 } }
      },
      plugins: { legend: { labels: { font: { family: 'IBM Plex Sans' } } } }
    }
  });

  /* по кампаниям */
  const byCamp = {};
  rows.forEach(r => {
    if (!byCamp[r.campaign_id]) {
      byCamp[r.campaign_id] = { name: r.campaign_name, account: r.account_name,
        spend: 0, impressions: 0, clicks: 0, leads: 0, messages: 0 };
    }
    const c = byCamp[r.campaign_id];
    c.spend += r.spend; c.impressions += r.impressions; c.clicks += r.clicks;
    c.leads += r.leads; c.messages += r.messages;
  });

  const showAccount = currentAccount === 'all' && (data.accounts || []).length > 1;
  const campaigns = Object.values(byCamp).sort((a, b) => b.spend - a.spend);
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '';

  const rowHtml = c => `
    <td>${c.name}${showAccount && c.account ? '<small>' + c.account + '</small>' : ''}</td>
    <td>${fmtMoney(c.spend, cur)}</td>
    <td>${fmtInt(c.impressions)}</td>
    <td>${fmtInt(c.clicks)}</td>
    <td>${c.impressions ? (c.clicks / c.impressions * 100).toFixed(2) + '%' : '—'}</td>
    <td>${c.clicks ? fmtMoney(c.spend / c.clicks, cur) : '—'}</td>
    <td>${fmtInt(c.leads)}</td>
    <td>${fmtInt(c.messages)}</td>
    <td>${c.leads ? fmtMoney(c.spend / c.leads, cur) : '—'}</td>`;

  campaigns.forEach(c => {
    const tr = document.createElement('tr');
    tr.innerHTML = rowHtml(c);
    tbody.appendChild(tr);
  });

  const total = document.createElement('tr');
  total.className = 'total';
  total.innerHTML = rowHtml({ name: 'Итого', account: '', ...t });
  tbody.appendChild(total);
}

loadData();
</script>
</body>
</html>
