<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Реклама Meta — Прознание / CODDY</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root {
    --coal: #141414;
    --paper: #F7F6F2;
    --yellow: #FFD400;
    --blue: #2456D6;
    --grey: #8A8A84;
    --line: #E3E1DA;
    --card: #FFFFFF;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'IBM Plex Sans', sans-serif;
    background: var(--paper);
    color: var(--coal);
    min-height: 100vh;
  }
  .num { font-family: 'IBM Plex Mono', monospace; }

  /* ---------- шапка ---------- */
  header {
    background: var(--coal);
    color: #fff;
    padding: 20px 24px;
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }
  header h1 { font-size: 17px; font-weight: 600; letter-spacing: .01em; }
  header h1 span { color: var(--yellow); }
  #updated { font-size: 12px; color: #9a9a94; }

  .wrap { max-width: 1100px; margin: 0 auto; padding: 24px 24px 60px; }

  /* ---------- период ---------- */
  .periods { display: flex; gap: 8px; margin-bottom: 20px; }
  .periods button {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px; font-weight: 600;
    background: transparent;
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 7px 16px;
    cursor: pointer;
    color: var(--coal);
  }
  .periods button.active {
    background: var(--coal);
    color: var(--yellow);
    border-color: var(--coal);
  }
  .periods .refresh { margin-left: auto; color: var(--grey); }

  /* ---------- KPI ---------- */
  .kpis {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 10px;
    margin-bottom: 24px;
  }
  .kpi {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 14px 16px;
  }
  .kpi .label { font-size: 12px; color: var(--grey); margin-bottom: 6px; }
  .kpi .value { font-family: 'IBM Plex Mono', monospace; font-size: 22px; font-weight: 600; }
  .kpi.main { border-top: 3px solid var(--yellow); }
  .kpi.blue { border-top: 3px solid var(--blue); }

  /* ---------- блоки ---------- */
  .block {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 18px;
    margin-bottom: 24px;
  }
  .block h2 { font-size: 14px; font-weight: 600; margin-bottom: 14px; }
  .chart-box { position: relative; height: 280px; }

  /* ---------- таблица ---------- */
  .table-scroll { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; white-space: nowrap; }
  th, td { padding: 9px 12px; text-align: right; border-bottom: 1px solid var(--line); }
  th:first-child, td:first-child { text-align: left; white-space: normal; min-width: 180px; }
  th {
    font-size: 11px; font-weight: 600; color: var(--grey);
    text-transform: uppercase; letter-spacing: .04em;
  }
  td { font-family: 'IBM Plex Mono', monospace; }
  td:first-child { font-family: 'IBM Plex Sans', sans-serif; font-weight: 500; }
  tr.total td { font-weight: 600; border-top: 2px solid var(--coal); border-bottom: none; }

  /* ---------- статусы ---------- */
  #status { padding: 40px 0; text-align: center; color: var(--grey); font-size: 14px; }
  #status.error { color: #B33A2B; }

  /* ---------- пароль ---------- */
  #gate {
    position: fixed; inset: 0; background: var(--coal);
    display: flex; align-items: center; justify-content: center; z-index: 10;
  }
  #gate form { text-align: center; }
  #gate input {
    font-family: 'IBM Plex Mono', monospace; font-size: 15px;
    padding: 10px 14px; border: none; border-radius: 6px; outline: none;
    text-align: center; width: 220px;
  }
  #gate button {
    display: block; margin: 12px auto 0;
    font-family: 'IBM Plex Sans', sans-serif; font-size: 14px; font-weight: 600;
    background: var(--yellow); color: var(--coal);
    border: none; border-radius: 6px; padding: 9px 24px; cursor: pointer;
  }
  @media (max-width: 600px) {
    .wrap { padding: 16px 14px 40px; }
    .kpi .value { font-size: 18px; }
  }
</style>
</head>
<body>

<div id="gate">
  <form onsubmit="return checkPass(event)">
    <input type="password" id="passInput" placeholder="Пароль" autofocus>
    <button type="submit">Войти</button>
  </form>
</div>

<header>
  <h1>Реклама Meta <span>·</span> Прознание / CODDY</h1>
  <div id="updated"></div>
</header>

<div class="wrap">
  <div class="periods">
    <button data-days="7">7 дней</button>
    <button data-days="14">14 дней</button>
    <button data-days="30" class="active">30 дней</button>
    <button class="refresh" onclick="loadData(currentDays, true)">Обновить</button>
  </div>

  <div id="status">Загрузка…</div>

  <div id="content" style="display:none">
    <div class="kpis">
      <div class="kpi main"><div class="label">Расход</div><div class="value" id="kSpend">—</div></div>
      <div class="kpi"><div class="label">Лиды</div><div class="value" id="kLeads">—</div></div>
      <div class="kpi"><div class="label">Переписки</div><div class="value" id="kMsgs">—</div></div>
      <div class="kpi main"><div class="label">Цена лида</div><div class="value" id="kCpl">—</div></div>
      <div class="kpi blue"><div class="label">Клики</div><div class="value" id="kClicks">—</div></div>
      <div class="kpi blue"><div class="label">CTR</div><div class="value" id="kCtr">—</div></div>
    </div>

    <div class="block">
      <h2>Расход и лиды по дням</h2>
      <div class="chart-box"><canvas id="chart"></canvas></div>
    </div>

    <div class="block">
      <h2>По кампаниям</h2>
      <div class="table-scroll">
        <table>
          <thead><tr>
            <th>Кампания</th><th>Расход</th><th>Показы</th><th>Клики</th>
            <th>CTR</th><th>CPC</th><th>Лиды</th><th>Переписки</th><th>CPL</th>
          </tr></thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script>
/* ================= НАСТРОЙКИ ================= */
const GAS_URL = 'https://script.google.com/macros/s/AKfycbwUcboOjB-_cLVnh549OU6BLK43F4rBn6QDN6eVohKfc5YAcNP2T-K_KVRqKm4_iHg4/exec';
const PASSWORD = 'proznanie';                       // смените пароль
/* ============================================= */

let currentDays = 30;
let chart = null;

/* ---------- пароль (sessionStorage, как в общем index) ---------- */
if (sessionStorage.getItem('fb_dash_auth') === '1') {
  document.getElementById('gate').style.display = 'none';
}
function checkPass(e) {
  e.preventDefault();
  if (document.getElementById('passInput').value === PASSWORD) {
    sessionStorage.setItem('fb_dash_auth', '1');
    document.getElementById('gate').style.display = 'none';
  } else {
    document.getElementById('passInput').value = '';
    document.getElementById('passInput').placeholder = 'Неверный пароль';
  }
  return false;
}

/* ---------- переключение периода ---------- */
document.querySelectorAll('.periods button[data-days]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.periods button[data-days]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    loadData(parseInt(btn.dataset.days, 10));
  });
});

/* ---------- загрузка ---------- */
async function loadData(days, force) {
  currentDays = days;
  const status = document.getElementById('status');
  const content = document.getElementById('content');
  status.style.display = 'block';
  status.className = '';
  status.textContent = 'Загрузка…';
  content.style.display = 'none';

  try {
    const url = GAS_URL + '?days=' + days + (force ? '&nocache=1' : '');
    const resp = await fetch(url);
    const data = await resp.json();
    if (data.error) throw new Error(data.error);
    render(data);
    status.style.display = 'none';
    content.style.display = 'block';
  } catch (err) {
    status.className = 'error';
    status.textContent = 'Ошибка: ' + err.message;
  }
}

/* ---------- форматирование ---------- */
const fmtInt = n => n.toLocaleString('ru-RU');
const fmtMoney = (n, cur) => n.toLocaleString('ru-RU', { maximumFractionDigits: 2 }) + ' ' + cur;

/* ---------- отрисовка ---------- */
function render(data) {
  const cur = data.currency;
  const rows = data.rows;

  document.getElementById('updated').textContent =
    'Обновлено: ' + new Date(data.updated).toLocaleString('ru-RU');

  /* итоги */
  const t = { spend: 0, impressions: 0, clicks: 0, leads: 0, messages: 0 };
  rows.forEach(r => { for (const k in t) t[k] += r[k]; });

  document.getElementById('kSpend').textContent = fmtMoney(t.spend, cur);
  document.getElementById('kLeads').textContent = fmtInt(t.leads);
  document.getElementById('kMsgs').textContent = fmtInt(t.messages);
  document.getElementById('kCpl').textContent = t.leads ? fmtMoney(t.spend / t.leads, cur) : '—';
  document.getElementById('kClicks').textContent = fmtInt(t.clicks);
  document.getElementById('kCtr').textContent =
    t.impressions ? (t.clicks / t.impressions * 100).toFixed(2) + '%' : '—';

  /* по дням */
  const byDay = {};
  rows.forEach(r => {
    if (!byDay[r.date]) byDay[r.date] = { spend: 0, leads: 0, messages: 0 };
    byDay[r.date].spend += r.spend;
    byDay[r.date].leads += r.leads;
    byDay[r.date].messages += r.messages;
  });
  const days = Object.keys(byDay).sort();
  const labels = days.map(d => d.slice(8, 10) + '.' + d.slice(5, 7));

  if (chart) chart.destroy();
  chart = new Chart(document.getElementById('chart'), {
    data: {
      labels,
      datasets: [
        {
          type: 'bar', label: 'Расход, ' + cur,
          data: days.map(d => byDay[d].spend),
          backgroundColor: '#FFD400', borderRadius: 3, yAxisID: 'y'
        },
        {
          type: 'line', label: 'Лиды + переписки',
          data: days.map(d => byDay[d].leads + byDay[d].messages),
          borderColor: '#2456D6', backgroundColor: '#2456D6',
          tension: .3, pointRadius: 3, yAxisID: 'y1'
        }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      scales: {
        y: { position: 'left', grid: { color: '#EEECE5' } },
        y1: { position: 'right', grid: { display: false }, ticks: { precision: 0 } }
      },
      plugins: { legend: { labels: { font: { family: 'IBM Plex Sans' } } } }
    }
  });

  /* по кампаниям */
  const byCamp = {};
  rows.forEach(r => {
    if (!byCamp[r.campaign_id]) {
      byCamp[r.campaign_id] = { name: r.campaign_name, spend: 0, impressions: 0, clicks: 0, leads: 0, messages: 0 };
    }
    const c = byCamp[r.campaign_id];
    c.spend += r.spend; c.impressions += r.impressions; c.clicks += r.clicks;
    c.leads += r.leads; c.messages += r.messages;
  });

  const campaigns = Object.values(byCamp).sort((a, b) => b.spend - a.spend);
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '';

  const rowHtml = c => `
    <td>${c.name}</td>
    <td>${fmtMoney(c.spend, cur)}</td>
    <td>${fmtInt(c.impressions)}</td>
    <td>${fmtInt(c.clicks)}</td>
    <td>${c.impressions ? (c.clicks / c.impressions * 100).toFixed(2) + '%' : '—'}</td>
    <td>${c.clicks ? fmtMoney(c.spend / c.clicks, cur) : '—'}</td>
    <td>${fmtInt(c.leads)}</td>
    <td>${fmtInt(c.messages)}</td>
    <td>${c.leads ? fmtMoney(c.spend / c.leads, cur) : '—'}</td>`;

  campaigns.forEach(c => {
    const tr = document.createElement('tr');
    tr.innerHTML = rowHtml(c);
    tbody.appendChild(tr);
  });

  const total = document.createElement('tr');
  total.className = 'total';
  total.innerHTML = rowHtml({ name: 'Итого', ...t });
  tbody.appendChild(total);
}

loadData(30);
</script>
</body>
</html>
